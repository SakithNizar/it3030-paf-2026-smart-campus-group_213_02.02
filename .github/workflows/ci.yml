name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '25.0.2'

      - name: Build Backend
        run: |
          cd backend
          mvn clean install

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '25.5.0'

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build